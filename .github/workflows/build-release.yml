name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/codex-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/codex-manager
        run: npm ci

      - name: Check frontend
        working-directory: apps/codex-manager
        run: npm run check

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Build Windows bundle
        working-directory: apps/codex-manager
        run: npm run build:windows

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: codex-manager-windows
          path: |
            target/release/codex-manager.exe
            target/release/codex-manager-launcher.exe
            target/release/bundle/msi/*.msi

      - name: Upload bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Automated build for $GITHUB_REF_NAME"

          shopt -s nullglob globstar
          files=(
            target/release/codex-manager.exe
            target/release/codex-manager-launcher.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
